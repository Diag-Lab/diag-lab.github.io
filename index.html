<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diag. | 診断ポータル</title>
    <style>
        /* 清潔感のあるアプリ風デザイン */
        :root { --main: #007aff; --bg: #f2f2f7; }
        body { margin: 0; background: var(--bg); color: #1c1c1e; font-family: sans-serif; }
        header { background: #fff; padding: 15px; border-bottom: 1px solid #d1d1d6; text-align: center; position: sticky; top: 0; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--main); }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }

        /* 診断リスト */
        .card {
            background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 12px;
            display: flex; align-items: center; cursor: pointer; border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: 0.1s;
        }
        .card:active { transform: scale(0.97); background: #f9f9f9; }
        .icon { width: 60px; height: 60px; background: #e5e5ea; border-radius: 10px; margin-right: 15px; font-size: 1.8rem; display: flex; align-items: center; justify-content: center; }
        .info h2 { margin: 0; font-size: 1rem; }
        .info p { margin: 4px 0 0; font-size: 0.8rem; color: #8e8e93; }
        .hot { display: inline-block; background: #ff3b30; color: #fff; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; margin-top: 5px; font-weight: bold; }

        /* 診断中画面 */
        #quiz { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 100; flex-direction: column; padding: 40px 20px; box-sizing: border-box; text-align: center; }
        .q-text { font-size: 1.4rem; font-weight: bold; margin: 40px 0; }
        .btns { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .btn { padding: 18px; border-radius: 12px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .yes { background: var(--main); color: #fff; }
        .no { background: #e5e5ea; color: #000; }
    </style>
</head>
<body>

<header><div class="logo">Diag.</div></header>

<div class="container">
    <div class="card" onclick="start('zense')">
        <div class="icon">🧞‍♂️</div>
        <div class="info">
            <h2>あなたの「前世タイプ」診断！！</h2>
            <p>性格から魂のルーツを特定。</p>
            <span class="hot">人気 🔥</span>
        </div>
    </div>
    <div class="card" onclick="start('tsun')">
        <div class="icon">🎀</div>
        <div class="info">
            <h2>ツンデレ比率診断</h2>
            <p>素直になれない心の割合を数値化。</p>
        </div>
    </div>
</div>

<div id="quiz">
    <div id="q-num" style="color: var(--main); font-weight: bold;">Q.1</div>
    <div id="q-text" class="q-text">質問</div>
    <div class="btns">
        <button class="btn yes" onclick="answer(true)">はい</button>
        <button class="btn no" onclick="answer(false)">いいえ</button>
    </div>
</div>

<script>
    const data = {
        zense: { q: ["直感を信じる？", "一人が好き？", "歴史が好き？", "運が良い方？", "冒険したい？"] },
        tsun: { q: ["褒められると照れる？", "素直になれない？", "実は甘えん坊？", "怒りっぽい？", "ギャップがある？"] }
    };
    let cur = null, step = 0, score = 0;
    function start(t) {
        cur = data[t]; step = 0; score = 0;
        document.getElementById('quiz').style.display = 'flex';
        render();
    }
    function render() {
        document.getElementById('q-num').innerText = "Q." + (step + 1);
        document.getElementById('q-text').innerText = cur.q[step];
    }
    function answer(v) {
        if(v) score++;
        step++;
        if(step < 5) render();
        else {
            alert("診断結果: タイプ" + score + "\n詳細ロジックは作成中です！");
            document.getElementById('quiz').style.display = 'none';
        }
    }
</script>

</body>
</html>
